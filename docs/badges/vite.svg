<svg xmlns="http://www.w3.org/2000/svg"
     width="107"
     height="28"
     role="img"
     aria-label="Vite: Build">
  <title>Vite: Build</title>

  <mask id="rounded">
    <rect
      width="107"
      height="28"
      rx="6"
      fill="#ffffff"
    />
  </mask>

  <g mask="url(#rounded)">
    <rect
      width="50"
      height="28"
      fill="#454A50"
    />
    <rect
      x="50"
      width="57"
      height="28"
      fill="#646CFF"
    />
  </g>

  <g
    fill="#ffffff"
    text-anchor="middle"
    font-family="Verdana, Geneva, DejaVu Sans, sans-serif"
    font-size="11"
    font-weight="600"
  >
    <text
      x="25.0"
      y="18"
